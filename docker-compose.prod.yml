services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: consultorio_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups:/backups
    # Sin ports: MySQL solo accesible desde la red interna de Docker
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    image: ${GHCR_IMAGE_PREFIX}/consultorio-backend:latest
    build: ./backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      GOOGLE_PLACE_ID: ${GOOGLE_PLACE_ID:-}
    volumes:
      - uploads_data:/app/uploads
    # Sin ports: el backend solo es accesible desde Nginx en la red interna
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${GHCR_IMAGE_PREFIX}/consultorio-frontend:latest
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - uptime-kuma
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
      - kuma_data:/app/data
    restart: unless-stopped

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
  kuma_data:
  uploads_data:
