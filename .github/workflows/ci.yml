name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # Paso 1: Compilar y testear backend
  # Tests contra H2 en memoria — no requiere MySQL.
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend — compile & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile & test
        working-directory: backend
        run: mvn verify -B --no-transfer-progress

  # ─────────────────────────────────────────────
  # Paso 2 y 3: Build y push imágenes a GHCR
  # Push solo en merge a main; en PRs solo buildea.
  # ─────────────────────────────────────────────
  docker-backend:
    name: Docker — backend image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/consultorio-backend:latest
            ghcr.io/${{ github.repository_owner }}/consultorio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker — frontend image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/consultorio-frontend:latest
            ghcr.io/${{ github.repository_owner }}/consultorio-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Paso 4: Deploy al servidor Hetzner vía SSH
  # Solo corre en merge a main, después de ambos pushes.
  # Secrets requeridos: HETZNER_HOST, HETZNER_USER, HETZNER_SSH_KEY
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy — Hetzner
    runs-on: ubuntu-latest
    needs: [docker-backend, docker-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/sebastian/consultorio-odontologico
            docker compose -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
