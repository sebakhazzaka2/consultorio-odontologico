name: CI

on:
  push:
    branches: [main, p2-docker-cicd]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Paso 1: Compilar y testear backend
  # Los tests corren contra H2 en memoria —
  # no se necesita un servicio MySQL externo.
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend — compile & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile & test
        working-directory: backend
        run: mvn verify -B --no-transfer-progress

  # ─────────────────────────────────────────────
  # Paso 2 y 3: Build imágenes Docker (paralelo)
  # Solo corren si backend-test pasó.
  # ─────────────────────────────────────────────
  docker-backend:
    name: Docker — backend image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: consultorio-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: Docker — frontend image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: consultorio-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
