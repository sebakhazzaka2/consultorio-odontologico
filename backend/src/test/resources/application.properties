# Configuración de tests — reemplaza application.properties para evitar dependencias
# de MySQL y variables de entorno (DB_PASSWORD, JWT_SECRET).

server.servlet.context-path=/api

# H2 en memoria: base de datos que vive solo mientras dura el test
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate genera el schema desde las entidades JPA (evita que los scripts Flyway
# con sintaxis MySQL-only fallen en H2)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway desactivado: en tests, Hibernate crea el schema directamente
spring.flyway.enabled=false

# JWT con secret fijo de 32+ chars para que JwtService arranque sin variable de entorno
jwt.secret=test-secret-key-for-consultorio-tests-ok
jwt.expiration=3600000

# CORS — valor de test, no afecta lógica de seguridad en contexto H2
app.cors.allowed-origins=http://localhost:4200

# Reducir ruido en la salida de tests
logging.level.org.springframework=WARN
logging.level.com.consultorio=INFO
