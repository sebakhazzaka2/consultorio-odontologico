# Test configuration — H2 in-memory, overrides main application.properties
spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway off — Hibernate manages schema in tests
spring.flyway.enabled=false

jwt.secret=test-secret-key-for-tests-only-minimum-256-bits-padding-here
jwt.expiration=3600000

app.cors.allowed-origins=http://localhost:4200
app.admin.email=admin@test.dev
app.admin.password=admin123

logging.level.org.springframework=WARN
logging.level.com.consultorio=INFO
