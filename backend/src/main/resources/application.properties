# Puerto y base de la API
server.port=8080
server.servlet.context-path=/api

# MySQL 8 (valores se inyectan vía variables de entorno)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT (secret para firmar/verificar tokens)
app.jwt.secret=${JWT_SECRET}

