# Perfil activo por defecto (Docker lo sobreescribe con SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=local

# Puerto y base de la API
server.port=8080
server.servlet.context-path=/api

# MySQL 8 (contraseña y JWT: definir en application-local.properties o variables de entorno)
spring.datasource.url=jdbc:mysql://localhost:3306/consultorio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# JWT (secret para firmar/verificar tokens)
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# CORS — lista separada por comas. Sobreescribir por perfil o variable de entorno.
app.cors.allowed-origins=http://localhost:4200

# Admin seed — en local usa valores de application-local.properties
app.admin.email=admin@local.dev
app.admin.password=admin123

# Flyway — baseline-on-migrate permite adoptar una DB existente sin re-ejecutar V1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

logging.level.org.springframework=DEBUG
logging.level.com.consultorio=DEBUG

# Sentry — deshabilitado si SENTRY_DSN no está seteado (default vacío)
sentry.dsn=${SENTRY_DSN:}

# Uploads — directorio donde se guardan las imágenes subidas
app.uploads.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Datos de la clinica — sobreescribibles por env vars en produccion
clinic.nombre=${CLINIC_NOMBRE:Dental Montecaseros}
clinic.tagline=${CLINIC_TAGLINE:Odontologia de calidad en Montevideo}
clinic.direccion=${CLINIC_DIRECCION:Monte Caseros 2687a}
clinic.ciudad=${CLINIC_CIUDAD:Montevideo, Uruguay}
clinic.horario=${CLINIC_HORARIO:Lunes a Viernes 09:00 - 18:00}
clinic.telefono=${CLINIC_TELEFONO:+59899572537}
clinic.whatsapp=${CLINIC_WHATSAPP:59899572537}
clinic.email=${CLINIC_EMAIL:dentalmontecaseros@gmail.com}
clinic.nosotros=${CLINIC_NOSOTROS:}
clinic.google-place-id=${GOOGLE_PLACE_ID:}
clinic.stats-pacientes=${CLINIC_STATS_PACIENTES:500+}
clinic.stats-anos-experiencia=${CLINIC_STATS_ANOS_EXPERIENCIA:10}
clinic.stats-calificacion=${CLINIC_STATS_CALIFICACION:4.7}

# Google Places API — clave del servidor, nunca exponer al frontend
# Definir en application-local.properties o en .env
google.places.api-key=${GOOGLE_PLACES_API_KEY:}
