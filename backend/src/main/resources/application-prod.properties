# Datasource — host y puerto inyectados por env vars (Docker Compose / prod)
# DB_HOST default "db" coincide con el service name en docker-compose.yml
spring.datasource.url=jdbc:mysql://${DB_HOST:db}:${DB_PORT:3306}/consultorio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# CORS — dominio(s) de producción, ej: https://tudominio.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# JWT — expiración corta en prod (mitigante sin revocación): 2h = 7200000 ms
jwt.expiration=7200000

# Actuator — solo el endpoint health, en puerto interno 8081 (no expuesto en nginx)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.server.port=8081

# Admin seed — credenciales del usuario administrador inicial
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Logging — reducido para producción
logging.level.org.springframework=WARN
logging.level.com.consultorio=INFO
