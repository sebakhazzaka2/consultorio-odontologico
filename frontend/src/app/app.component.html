<mat-toolbar color="primary" class="toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="title">{{ title }}</span>
  <span class="spacer"></span>
  <button mat-button routerLink="/" routerLinkActive="active-link">
    <mat-icon>home</mat-icon>
    Inicio
  </button>
  <button mat-button routerLink="/servicios" routerLinkActive="active-link">
    <mat-icon>medical_services</mat-icon>
    Servicios
  </button>
  <button mat-button routerLink="/registro" routerLinkActive="active-link">
    <mat-icon>event</mat-icon>
    Agendar Cita
  </button>
  <button mat-button routerLink="/citas" routerLinkActive="active-link">
    <mat-icon>list</mat-icon>
    Ver Citas
  </button>
  <button mat-button routerLink="/pacientes" routerLinkActive="active-link">
    <mat-icon>people</mat-icon>
    Pacientes
  </button>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="sidenav.close()">
        <mat-icon>home</mat-icon>
        <span class="nav-item-text">Inicio</span>
      </a>
      <a mat-list-item routerLink="/servicios" (click)="sidenav.close()">
        <mat-icon>medical_services</mat-icon>
        <span class="nav-item-text">Servicios</span>
      </a>
      <a mat-list-item routerLink="/registro" (click)="sidenav.close()">
        <mat-icon>event</mat-icon>
        <span class="nav-item-text">Agendar Cita</span>
      </a>
      <a mat-list-item routerLink="/citas" (click)="sidenav.close()">
        <mat-icon>list</mat-icon>
        <span class="nav-item-text">Ver Citas</span>
      </a>
      <a mat-list-item routerLink="/pacientes" (click)="sidenav.close()">
        <mat-icon>people</mat-icon>
        <span class="nav-item-text">Pacientes</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- Chat flotante -->
<app-chat></app-chat>
