<div class="chat-container">
  <!-- Botón flotante para abrir el chat -->
  <button 
    *ngIf="!isOpen" 
    mat-fab 
    color="primary" 
    class="chat-button"
    (click)="toggleChat()"
    aria-label="Abrir chat">
    <mat-icon>chat</mat-icon>
  </button>

  <!-- Ventana del chat -->
  <div class="chat-window" [class.open]="isOpen" *ngIf="isOpen">
    <!-- Header del chat -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="chat-avatar">
          <mat-icon>local_hospital</mat-icon>
        </div>
        <div class="chat-header-text">
          <h3>Consultorio Odontológico</h3>
          <span class="chat-status">En línea</span>
        </div>
      </div>
      <button mat-icon-button (click)="toggleChat()" class="close-button">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Área de mensajes -->
    <div class="chat-messages" #mensajesContainer>
      <div 
        *ngFor="let mensaje of mensajes" 
        class="message-wrapper"
        [class.user-message]="mensaje.esUsuario"
        [class.bot-message]="!mensaje.esUsuario">
        <div class="message-bubble">
          <div class="message-header" *ngIf="!mensaje.esUsuario">
            <span class="message-name">{{ mensaje.nombre }}</span>
          </div>
          <p class="message-text">{{ mensaje.texto }}</p>
          <span class="message-time">{{ formatearHora(mensaje.timestamp) }}</span>
        </div>
      </div>
    </div>

    <!-- Input para escribir mensajes -->
    <div class="chat-input-container">
      <mat-form-field appearance="outline" class="chat-input-field">
        <input 
          matInput 
          [(ngModel)]="nuevoMensaje"
          (keydown)="enviarConEnter($event)"
          placeholder="Escribe tu mensaje..."
          #inputMensaje>
      </mat-form-field>
      <button 
        mat-icon-button 
        color="primary" 
        (click)="enviarMensaje()"
        [disabled]="!nuevoMensaje.trim()"
        class="send-button">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
</div>
