<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    class="sidenav">

    <a routerLink="/admin" class="sidebar-brand">
      <mat-icon class="brand-icon">health_and_safety</mat-icon>
      <div class="brand-text">
        <span class="brand-title">TurnosUy</span>
      </div>
    </a>

    <mat-nav-list>
      <a mat-list-item routerLink="/admin/pacientes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Pacientes</span>
      </a>
      <a mat-list-item routerLink="/admin/agenda" routerLinkActive="active-link">
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Agenda</span>
      </a>
      <a mat-list-item routerLink="/admin/citas" routerLinkActive="active-link">
        <mat-icon matListItemIcon>event</mat-icon>
        <span matListItemTitle>Citas</span>
      </a>
      <a mat-list-item routerLink="/admin/tratamientos" routerLinkActive="active-link">
        <mat-icon matListItemIcon>healing</mat-icon>
        <span matListItemTitle>Tratamientos</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      @if (isMobile) {
        <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn" aria-label="Menú">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">{{ businessName }}</span>
      <button mat-icon-button (click)="onChangePassword()" aria-label="Cambiar contraseña" matTooltip="Cambiar contraseña">
        <mat-icon>lock_reset</mat-icon>
      </button>
      <button mat-icon-button (click)="onLogout()" class="logout-btn" aria-label="Cerrar sesión" matTooltip="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
