# Rate limiting — 5 req/min por IP en el endpoint de login (datos médicos)
# Definido aquí a nivel http context (este archivo se incluye dentro de http{} en nginx.conf)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — rutas desconocidas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Login con rate limiting — exact match tiene prioridad sobre /api/ prefix
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8080;
        proxy_pass $backend/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy al backend Spring Boot dentro del compose network.
    # resolver 127.0.0.11: DNS interno de Docker — resuelve "backend" en runtime
    # en lugar de al arrancar Nginx (evita fallo si el contenedor aún no existe).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8080;
        proxy_pass $backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
