server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — rutas desconocidas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend Spring Boot dentro del compose network.
    # resolver 127.0.0.11: DNS interno de Docker — resuelve "backend" en runtime
    # en lugar de al arrancar Nginx (evita fallo si el contenedor aún no existe).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8080;
        proxy_pass $backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
