# Rate limiting — 5 req/min por IP en el endpoint de login (datos médicos)
# Definido aquí a nivel http context (este archivo se incluye dentro de http{} en nginx.conf)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    # Caddy (reverse proxy) corre en la red interna de Docker (172.16.0.0/12).
    # real_ip reemplaza $remote_addr con la IP real del cliente para rate limiting.
    set_real_ip_from 172.16.0.0/12;
    real_ip_header X-Real-IP;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — rutas desconocidas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Actuator — bloqueado en nginx (corre en puerto interno 8081, nunca debe ser público)
    location /api/actuator {
        deny all;
        return 403;
    }

    # Login con rate limiting — exact match tiene prioridad sobre /api/ prefix
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy al backend Spring Boot dentro del compose network.
    # Hostname literal (no variable) para que nginx haga la sustitución de path correctamente.
    # Docker Compose garantiza que "backend" esté resuelto cuando nginx arranca (depends_on).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
